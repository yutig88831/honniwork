        function updateLunarDisplay() {
            const y = parseInt(document.getElementById('sYear').value);
            const m = parseInt(document.getElementById('sMonth').value);
            const d = parseInt(document.getElementById('sDay').value);
            const label = document.getElementById('lunarResultText');
            if (y > 1900 && m > 0 && m <= 12 && d > 0 && d <= 31) {
                try {
                    const solar = Solar.fromYmd(y, m, d);
                    const lunar = solar.getLunar();
                    label.innerText = `${lunar.getYear() - 1911}.${lunar.getMonth()}.${lunar.getDay()}`;
                } catch(e) { label.innerText = "--"; }
            } else { label.innerText = "--"; }
        }

        document.getElementById('sYear').addEventListener('input', updateLunarDisplay);
        document.getElementById('sMonth').addEventListener('input', updateLunarDisplay);
        document.getElementById('sDay').addEventListener('input', updateLunarDisplay);

        function getStarName(numStr) {
            if (numStr[0] === numStr[1] || numStr.includes('0')) return "伏位";
            for (let star in starDB) {
                if (starDB[star].numbers.includes(numStr)) return star;
            }
            return "其它";
        }

        function applyYijingRules(str) {
            if (!str) return "";
            let digits = str.replace(/[^0-9]/g, "").split("");
            let res = [];
            for (let i = 0; i < digits.length; i++) {
                if (digits[i] === '5') {
                    if (i === 0 || i === digits.length - 1) res.push('0');
                } else {
                    res.push(digits[i]);
                }
            }
            return res.join("");
        }

        // 車牌號碼專用 5 處理規則
        function applyCarPlateRules(str) {
            if (!str) return "";
            let digits = str.split("");
            let res = [];
            for (let i = 0; i < digits.length; i++) {
                if (digits[i] === '5') {
                    // 頭尾變 0 (伏位)，中間刪除
                    if (i === 0 || i === digits.length - 1) {
                        res.push('0');
                    }
                    // 中間不做任何事 (即刪除)
                } else {
                    res.push(digits[i]);
                }
            }
            return res.join("");
        }

                        if (s !== "其它") birthdayStarCounts[s] = (birthdayStarCounts[s] || 0) + 1;
                    });
                    renderBirthdayCards(otherSection, "生日磁場分析(農曆生日)", birthdayGroups);
                } catch(e) { console.error(e); }
            }

            if (idVal) {
                let idDigits = idVal.replace(/[A-Z]/g, m => alphaMap[m]);
                let finalId = applyYijingRules(idDigits);
                renderMainAgeTable(idSection, finalId, currentUserAge, birthdayStarCounts);
            }

            if (phoneVal) {
                const phoneClean = applyYijingRules(phoneVal);
                renderSimpleCards(otherSection, "📱 手機號碼解析", generateGroups(phoneClean));
            }

            if (carVal) {
                // 車牌字母轉數字 (ABC-1234 -> 1231234)
                let carDigits = carVal.replace(/[A-Z]/g, m => alphaMap[m]).replace(/[^0-9]/g, "");
                // 處理 5 的規則
                let finalCar = applyCarPlateRules(carDigits);
                renderSimpleCards(otherSection, "🚗 車牌號碼解析", generateGroups(finalCar));
            }

            window.scrollTo({ top: resDiv.offsetTop - 20, behavior: 'smooth' });
        }

        function generateGroups(str) {
            let arr = [];
            if (str.length < 2) return arr;
            for (let i = 0; i < str.length - 1; i++) {
                arr.push(str.substring(i, i + 2));
            }
            return arr;
        }

        function renderMainAgeTable(container, cleanStr, userAge, birthdayCounts) {
            const intervals = [
                {l: "0-13", min: 0, max: 13}, {l: "13-18", min: 13, max: 18},
                {l: "18-23", min: 18, max: 23}, {l: "23-28", min: 23, max: 28},
                {l: "28-33", min: 28, max: 33}, {l: "33-38", min: 33, max: 38},
                {l: "38-43", min: 38, max: 43}, {l: "43-48", min: 43, max: 48},
                {l: "48-53", min: 48, max: 53}, {l: "53-58", min: 53, max: 58},
                {l: "58-63", min: 58, max: 63}, {l: "63-68", min: 63, max: 68},
                {l: "68-73", min: 68, max: 73}
            ];
            
            let repeated = cleanStr;
            while (repeated.length < 60) repeated += cleanStr;
            let pairs = generateGroups(repeated);

            let totalCounts = { ...birthdayCounts }; 
            let lastSolidStar = "伏位";

            const processedData = intervals.map((gap, idx) => {
                const num = pairs[idx] || "00";
                const base = getStarName(num);
                let display = base;
                let coreEnergy = base;

                if (base === "伏位" && lastSolidStar !== "伏位") {
                    display = `${lastSolidStar}(延續)`;
                    coreEnergy = lastSolidStar; 
                    totalCounts["伏位"] = (totalCounts["伏位"] || 0) + 1;
                } else {
                    if (base !== "其它") totalCounts[base] = (totalCounts[base] || 0) + 1;
                    if (base !== "伏位") lastSolidStar = base;
                }

                const isCurrent = (userAge !== null) && (userAge >= gap.min && userAge < gap.max);
                if (isCurrent) currentActiveYearStar = coreEnergy;

                return { gap, num, display, coreEnergy, isCurrent };
            });

            let destiny = "伏位";
            let topCount = -1;
            for (let s in totalCounts) {
                if (totalCounts[s] > topCount) { topCount = totalCounts[s]; destiny = s; }
            }
            currentActiveDestinyStar = destiny;

            let html = `
            <div class="main-container p-6 md:p-10">
                <div class="destiny-banner">
                    <div>
                        <span class="text-[11px] uppercase font-bold text-stone-400 tracking-widest">核心本命磁場</span>
                        <div class="text-3xl font-bold mt-2 ${starDB[destiny]?.color || 'text-stone-600'}">${destiny}</div>
                    </div>
                    ${userAge ? `<div class="bg-stone-50 px-5 py-3 rounded-lg border border-stone-100 text-stone-500 font-bold text-sm leading-tight text-center">目前虛歲<br/>${userAge} 歲</div>` : ''}
                </div>
                <h2 class="text-lg font-bold text-stone-600 text-center mb-8 tracking-widest">身分證大運流年表</h2>
                <div class="max-w-xl mx-auto space-y-0.5">
            `;

            processedData.forEach(row => {
                const color = starDB[row.coreEnergy]?.color || "text-stone-400";
                const highlightClass = row.isCurrent ? 'current-age-highlight' : '';
                html += `
                    <div class="age-row ${highlightClass}">
                        <div class="age-info-group">
                            <span class="age-text">${row.gap.l} 歲</span>
                            ${row.isCurrent ? `<span class="current-status-marker">(目前正在走的流年)</span>` : ''}
                        </div>
                        <div class="flex items-center">
                            <span class="num-badge">${row.num}</span>
                            <span class="star-result ${color}">${row.display}</span>
                        </div>
                    </div>
                `;
            });

            html += `</div></div>`;
            container.innerHTML = html;
        }

        function renderBirthdayCards(container, title, pairs) {
            let html = `<div class="main-container p-8 h-full">
                <h3 class="text-sm font-bold text-stone-500 mb-8 text-center tracking-widest uppercase border-b pb-4 border-stone-100">${title}</h3>
                <div class="grid grid-cols-3 gap-4">`;
            pairs.forEach(num => {
                const s = getStarName(num);
                html += `
                    <div class="star-badge-card">
                        <div class="text-[10px] text-stone-300 font-bold mb-1 font-mono">${num}</div>
                        <div class="text-[13px] font-bold ${starDB[s]?.color || 'text-stone-400'}">${s}</div>
                    </div>`;
            });
            html += `</div></div>`;
            container.innerHTML += html;
        }

        function renderSimpleCards(container, title, pairs) {
            let html = `<div class="main-container p-8 h-full">
                <h3 class="text-sm font-bold text-stone-500 mb-8 text-center tracking-widest uppercase border-b pb-4 border-stone-100">${title}</h3>
                <div class="grid grid-cols-3 gap-4">`;
            pairs.forEach(num => {
                const s = getStarName(num);
                html += `
                    <div class="star-badge-card">
                        <div class="text-[10px] text-stone-300 font-bold mb-1 font-mono">${num}</div>
                        <div class="text-[13px] font-bold ${starDB[s]?.color || 'text-stone-400'}">${s}</div>
                    </div>`;
            });
            html += `</div></div>`;
            container.innerHTML += html;
        }

        function openDeepAnalysisMenu() {
            if (!currentActiveDestinyStar) { alert("請先完成計算。"); return; }
            let html = `
                <div class="text-center mb-8">
                    <h2 class="text-xl font-bold text-stone-600 tracking-widest">選擇深入解析項目</h2>
                    <div class="w-10 h-0.5 bg-stone-200 mx-auto mt-4"></div>
                </div>
                <div class="space-y-4">
                    <button onclick="renderDeepDetail('destiny')" class="w-full flex items-center justify-between p-6 bg-stone-50 hover:bg-stone-100 border border-stone-100 rounded-2xl transition-all group">
                        <div class="text-left">
                            <div class="text-xs font-bold text-stone-400 uppercase tracking-widest">本命磁場</div>
                            <div class="text-2xl font-bold mt-1 ${starDB[currentActiveDestinyStar]?.color}">${currentActiveDestinyStar}</div>
                        </div>
                        <span class="text-stone-300 group-hover:text-stone-500 transition-all">❯</span>
                    </button>
                    <button onclick="renderDeepDetail('year')" class="w-full flex items-center justify-between p-6 bg-stone-50 hover:bg-stone-100 border border-stone-100 rounded-2xl transition-all group">
                        <div class="text-left">
                            <div class="text-xs font-bold text-stone-400 uppercase tracking-widest">流年磁場</div>
                            <div class="text-2xl font-bold mt-1 ${starDB[currentActiveYearStar]?.color}">${currentActiveYearStar || '尚未選定'}</div>
                        </div>
                        <span class="text-stone-300 group-hover:text-stone-500 transition-all">❯</span>
                    </button>
                </div>
            `;
            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('analysisModal').classList.remove('hidden');
        }

        function renderDeepDetail(type) {
            const targetStar = type === 'destiny' ? currentActiveDestinyStar : currentActiveYearStar;
            if (!targetStar || targetStar === "其它") { alert("無對應數據。"); return; }
            const data = deepAnalysisDB[targetStar];
            const colorClass = starDB[targetStar]?.color || "text-stone-600";
            const titlePrefix = type === 'destiny' ? '核心本命' : '當前流年';
            let html = `
                <div class="mb-8">
                    <button onclick="openDeepAnalysisMenu()" class="text-xs font-bold text-stone-400 hover:text-stone-600 mb-4 inline-flex items-center">
                        ❮ 返回選單
                    </button>
                    <div class="text-center">
                        <span class="text-[10px] font-bold text-stone-400 tracking-[0.3em] uppercase">${titlePrefix}深度解析</span>
                        <h2 class="text-4xl font-bold mt-2 ${colorClass}">${targetStar}磁場</h2>
                    </div>
                </div>
                <div class="space-y-6">
                    <div class="analysis-card">
                        <h4 class="text-xs font-bold text-stone-400 mb-2 tracking-widest uppercase">▸ 磁場特性</h4>
                        <p class="text-[14px] text-stone-600 leading-relaxed">${data.feature}</p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="p-4 border border-stone-100 rounded-xl bg-[#FCFBFA]">
                            <h4 class="text-xs font-bold text-stone-400 mb-2 uppercase">▸ 事業運勢</h4>
                            <p class="text-[13px] text-stone-600 leading-relaxed">${data.career}</p>
                        </div>
                        <div class="p-4 border border-stone-100 rounded-xl bg-[#FCFBFA]">
                            <h4 class="text-xs font-bold text-stone-400 mb-2 uppercase">▸ 財富預測</h4>
                            <p class="text-[13px] text-stone-600 leading-relaxed">${data.wealth}</p>
                        </div>
                        <div class="p-4 border border-stone-100 rounded-xl bg-[#FCFBFA]">
                            <h4 class="text-xs font-bold text-stone-400 mb-2 uppercase">▸ 健康注意</h4>
                            <p class="text-[13px] text-stone-600 leading-relaxed">${data.health}</p>
                        </div>
                        <div class="p-4 border border-stone-100 rounded-xl bg-[#FCFBFA]">
                            <h4 class="text-xs font-bold text-stone-400 mb-2 uppercase">▸ 情感磁場</h4>
                            <p class="text-[13px] text-stone-600 leading-relaxed">${data.love}</p>
                        </div>
                        <div class="p-4 border border-stone-100 rounded-xl bg-[#FCFBFA]">
                            <h4 class="text-xs font-bold text-stone-400 mb-2 uppercase">▸ 人際溝通</h4>
                            <p class="text-[13px] text-stone-600 leading-relaxed">${data.interpersonal}</p>
                        </div>
                        <div class="p-4 border border-stone-100 rounded-xl bg-[#FCFBFA]">
                            <h4 class="text-xs font-bold text-stone-400 mb-2 uppercase">▸ 家庭關係</h4>
                            <p class="text-[13px] text-stone-600 leading-relaxed">${data.family}</p>
                        </div>
                        <div class="p-4 border border-stone-100 rounded-xl bg-[#FCFBFA] md:col-span-2">
                            <h4 class="text-xs font-bold text-stone-400 mb-2 uppercase">▸ 適合的工作或行業</h4>
                            <p class="text-[13px] text-stone-600 leading-relaxed">${data.jobs}</p>
                        </div>
                    </div>
                </div>
                <button onclick="closeModal()" class="w-full mt-10 py-4 bg-stone-100 text-stone-500 rounded-xl font-bold text-sm hover:bg-stone-200 transition-colors">關閉解析報告</button>
            `;
            document.getElementById('modalContent').innerHTML = html;
        }

        function closeModal() { document.getElementById('analysisModal').classList.add('hidden'); }
    </script>
</body>
</html>
